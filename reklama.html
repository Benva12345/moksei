<input type="text" id="searchInput"
  placeholder="Search..."
  oninput="filterList()" />

<!-- 2. The list to filter -->
<ul id="itemList">
  <li>Dell Inspiron 5521 (100)</li>
  <li>Banana</li>
  <li>Cherry</li>
  <!-- ...more items -->
</ul>

<script>
function filterList() {
  // Get what the user typed
  const query = document.getElementById("searchInput")
    .value.toLowerCase();

  // Loop through every list item
  const items = document.querySelectorAll("#itemList li");
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    // Show item if it matches, hide if it doesn't
    item.style.display = text.includes(query)
      ? "block" : "none";
  });
}
</script>
